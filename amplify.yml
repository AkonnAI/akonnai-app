version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - |
          cat > .env.production << EOF
          AWS_REGION=${AWS_REGION}
          REGION=${REGION}
          DYNAMODB_BOOKINGS_TABLE=${DYNAMODB_BOOKINGS_TABLE}
          DYNAMODB_USERS_TABLE=${DYNAMODB_USERS_TABLE}
          COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
          COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
          AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET}
          ACCESS_KEY_ID=${ACCESS_KEY_ID}
          SECRET_ACCESS_KEY=${SECRET_ACCESS_KEY}
          GMAIL_USER=${GMAIL_USER}
          GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
          SES_ADMIN_EMAIL=${SES_ADMIN_EMAIL}
          SES_FROM_EMAIL=${SES_FROM_EMAIL}
          DEMO_APP_URL=${DEMO_APP_URL}
          GAS_WEBHOOK_URL=${GAS_WEBHOOK_URL}
          NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
          NEXT_PUBLIC_DEMO_APP_URL=${NEXT_PUBLIC_DEMO_APP_URL}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID=${NEXT_PUBLIC_COGNITO_USER_POOL_ID}
          NEXT_PUBLIC_COGNITO_CLIENT_ID=${NEXT_PUBLIC_COGNITO_CLIENT_ID}
          NEXT_PUBLIC_COGNITO_REGION=${NEXT_PUBLIC_COGNITO_REGION}
          EOF
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
